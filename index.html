<!DOCTYPE html>
<html lang="de" data-theme="neon">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Socialy – Teile deine Videos</title>
<meta name="description" content="Socialy – lade Videos hoch und teile sie mit der Welt." />
<script>
  (function () {
    try {
      var theme = localStorage.getItem("socialy_theme") || "neon";
      document.documentElement.setAttribute("data-theme", theme);
      var lang = localStorage.getItem("socialy_lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff2d78'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='30' height='30' rx='9' fill='url(%23g)'/%3E%3Cpath d='M13 10l10 6-10 6z' fill='white'/%3E%3C/svg%3E" />
</head>
<body>

<!-- Shared icon sprite – every <use href="#ic-..."> below references this once-defined set -->
<svg aria-hidden="true" style="position:absolute; width:0; height:0; overflow:hidden;">
  <defs>
    <symbol id="ic-logo" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></symbol>
    <symbol id="ic-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
    <symbol id="ic-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
    <symbol id="ic-close" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></symbol>
    <symbol id="ic-palette" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 3.5 17.3c.7-.3 1-1 .8-1.7-.2-.5-.6-.9-.6-1.6 0-1 .8-1.8 1.8-1.8h1.7A3.8 3.8 0 0 0 23 11.6C22.7 6.8 17.9 3 12 3z"></path><circle cx="7.3" cy="10.8" r="1.15" fill="currentColor" stroke="none"></circle><circle cx="11.6" cy="7.4" r="1.15" fill="currentColor" stroke="none"></circle><circle cx="16.2" cy="9.6" r="1.15" fill="currentColor" stroke="none"></circle></symbol>
    <symbol id="ic-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><line x1="3" y1="12" x2="21" y2="12"></line><path d="M12 3a14 14 0 0 1 0 18a14 14 0 0 1 0-18z"></path></symbol>
    <symbol id="ic-user" viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="4.4"></circle></symbol>
    <symbol id="ic-heart" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path></symbol>
    <symbol id="ic-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></symbol>
    <symbol id="ic-comment" viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5H6l-3 3v-4.7A8.5 8.5 0 1 1 21 11.5z"></path></symbol>
    <symbol id="ic-send" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></symbol>
    <symbol id="ic-home" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5 10v10h5v-6h4v6h5V10"></path></symbol>
    <symbol id="ic-video" viewBox="0 0 24 24"><rect x="2" y="5" width="15" height="14" rx="2.5"></rect><path d="M17 9.5 22 6.5v11l-5-3"></path></symbol>
    <symbol id="ic-upload-cloud" viewBox="0 0 24 24"><path d="M7.5 18a4.5 4.5 0 0 1-1-8.9 5.5 5.5 0 0 1 10.6-2A4 4 0 0 1 16.5 15"></path><path d="M12 12.5v7"></path><path d="M8.8 15.6 12 12.5l3.2 3.1"></path></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></symbol>
  </defs>
</svg>

<header class="app-header">
  <div class="header-row">
    <a class="brand" href="#" id="brandLink" aria-label="Socialy – zur Startseite">
      <span class="brand-mark"><svg class="ico ico--filled"><use href="#ic-logo"></use></svg></span>
      <span class="brand-name"><span class="brand-name-text">Socialy</span></span>
    </a>

    <div class="search-wrap">
      <input id="searchInput" type="text" data-i18n-placeholder="nav.searchPlaceholder" placeholder="Videos durchsuchen..." autocomplete="off" />
      <button type="button" class="search-btn" id="searchBtn" data-i18n-title="nav.searchTab" title="Suchen">
        <svg class="ico"><use href="#ic-search"></use></svg>
      </button>
    </div>

    <div class="header-actions">
      <button class="btn btn-primary upload-btn-desktop" id="openUploadBtn">
        <svg class="ico"><use href="#ic-plus"></use></svg>
        <span data-i18n="nav.upload">Hochladen</span>
      </button>

      <div class="dropdown" id="themeDropdown">
        <button class="btn btn-icon" id="themeBtn" data-i18n-title="nav.theme" title="Design ändern">
          <svg class="ico"><use href="#ic-palette"></use></svg>
        </button>
        <div class="dropdown-panel hidden" id="themePanel"></div>
      </div>

      <div class="dropdown" id="langDropdown">
        <button class="btn btn-icon" id="langBtn" data-i18n-title="nav.language" title="Sprache ändern">
          <svg class="ico"><use href="#ic-globe"></use></svg>
        </button>
        <div class="dropdown-panel hidden" id="langPanel"></div>
      </div>

      <button class="user-chip" id="userChipBtn" data-i18n-title="nav.changeNamePrompt" title="Namen ändern">
        <span class="avatar" id="userAvatar">?</span>
        <span id="userNameLabel">Gast</span>
      </button>
    </div>
  </div>

  <div class="filter-row" id="filterRow">
    <button type="button" class="filter-pill active" data-filter="all" data-i18n="filter.all">Alle</button>
    <button type="button" class="filter-pill" data-filter="new" data-i18n="filter.new">Neu</button>
    <button type="button" class="filter-pill" data-filter="popular" data-i18n="filter.popular">Beliebt</button>
    <button type="button" class="filter-pill" data-filter="mostViewed" data-i18n="filter.mostViewed">Meistgesehen</button>
    <button type="button" class="filter-pill" data-filter="mine" id="mineFilterPill" data-i18n="filter.mine">Meine Videos</button>
  </div>
</header>

<main>
  <div class="feed-heading">
    <h1 id="feedHeading" data-i18n="feed.heading">Für dich</h1>
    <span id="videoCountLabel"></span>
  </div>

  <div class="video-grid" id="videoGrid"></div>

  <div class="empty-state hidden" id="emptyState">
    <svg class="ico"><use href="#ic-video"></use></svg>
    <h2 data-i18n="empty.title">Noch keine Videos</h2>
    <p data-i18n="empty.desc">Sei die/der Erste und lade ein Video hoch!</p>
  </div>
</main>

<!-- Watch overlay -->
<div class="watch-overlay hidden" id="watchOverlay">
  <button class="btn btn-icon watch-close" id="closeWatchBtn" data-i18n-title="watch.close" title="Schließen">
    <svg class="ico"><use href="#ic-close"></use></svg>
  </button>
  <div class="watch-shell">
    <div class="watch-player">
      <video id="watchVideo" controls autoplay playsinline></video>
    </div>
    <div class="watch-info">
      <h2 class="watch-title" id="watchTitle"></h2>
      <div class="watch-author">
        <span class="avatar" id="watchAvatar"></span>
        <div>
          <div class="name" id="watchUsername"></div>
          <div class="date" id="watchMeta"></div>
        </div>
      </div>
      <p class="watch-description" id="watchDescription"></p>
      <div class="watch-actions">
        <button class="action-btn" id="likeBtn">
          <svg class="ico"><use href="#ic-heart"></use></svg>
          <span id="likeCount">0</span>
        </button>
        <div class="action-btn is-static">
          <svg class="ico"><use href="#ic-eye"></use></svg>
          <span id="viewCount">0</span>
        </div>
      </div>
      <div class="comments-section">
        <h3 id="commentCountLabel">
          <svg class="ico"><use href="#ic-comment"></use></svg>
          <span data-i18n="watch.comments">Kommentare</span>
        </h3>
        <form class="comment-form" id="commentForm">
          <input type="text" id="commentInput" data-i18n-placeholder="watch.commentPlaceholder" placeholder="Kommentar schreiben..." maxlength="500" autocomplete="off" />
          <button type="submit" class="btn btn-icon btn-primary" aria-label="Senden" data-i18n-title="watch.send" title="Senden">
            <svg class="ico"><use href="#ic-send"></use></svg>
          </button>
        </form>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Upload modal -->
<div class="modal-overlay hidden" id="uploadModalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 data-i18n="upload.title">Video hochladen</h2>
      <button class="btn btn-icon" id="closeUploadBtn">
        <svg class="ico"><use href="#ic-close"></use></svg>
      </button>
    </div>

    <form id="uploadForm">
      <div class="dropzone" id="dropzone">
        <svg class="ico"><use href="#ic-upload-cloud"></use></svg>
        <div id="dropzoneLabel" data-i18n="upload.dropzoneLabel">Video auswählen oder hierher ziehen</div>
        <small id="dropzoneHint">MP4, WebM oder MOV – max. 50 MB</small>
        <input type="file" id="fileInput" accept="video/mp4,video/webm,video/quicktime,video/*" hidden />
      </div>

      <div class="video-preview hidden" id="videoPreviewWrap">
        <video id="videoPreview" muted playsinline></video>
      </div>
      <canvas id="thumbCanvas" class="hidden" width="480" height="270"></canvas>

      <div class="upload-progress hidden" id="uploadProgress">
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="uploadProgressFill"></div>
        </div>
        <span id="uploadProgressLabel">0%</span>
      </div>

      <div class="field">
        <label for="titleInput" data-i18n="upload.titleLabel">Titel *</label>
        <input type="text" id="titleInput" maxlength="120" data-i18n-placeholder="upload.titlePlaceholder" placeholder="Wie heißt dein Video?" required />
      </div>

      <div class="field">
        <label for="descriptionInput" data-i18n="upload.descLabel">Beschreibung</label>
        <textarea id="descriptionInput" maxlength="2000" data-i18n-placeholder="upload.descPlaceholder" placeholder="Erzähl etwas über dein Video..."></textarea>
      </div>

      <div class="field">
        <label for="usernameInput" data-i18n="upload.usernameLabel">Dein Name *</label>
        <input type="text" id="usernameInput" maxlength="40" data-i18n-placeholder="upload.usernamePlaceholder" placeholder="Benutzername" required />
      </div>

      <div class="form-error" id="uploadError"></div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancelUploadBtn" data-i18n="upload.cancel">Abbrechen</button>
        <button type="submit" class="btn btn-primary" id="submitUploadBtn" data-i18n="upload.submit">Veröffentlichen</button>
      </div>
    </form>
  </div>
</div>

<!-- Onboarding banner -->
<div class="onboard-banner hidden" id="onboardBanner">
  <p data-i18n="onboard.text">Wie sollen wir dich nennen?</p>
  <div class="row">
    <input type="text" id="onboardNameInput" maxlength="40" data-i18n-placeholder="onboard.placeholder" placeholder="Dein Name" autocomplete="off" />
    <button class="btn btn-primary" id="onboardSaveBtn" data-i18n="onboard.save">OK</button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<!-- Mobile bottom navigation -->
<nav class="bottom-nav" id="bottomNav" aria-label="Hauptnavigation">
  <button type="button" class="bottom-nav-item active" id="bottomHomeBtn" data-nav="home">
    <svg class="ico"><use href="#ic-home"></use></svg>
    <span data-i18n="nav.home">Start</span>
  </button>
  <button type="button" class="bottom-nav-item" id="bottomSearchBtn" data-nav="search">
    <svg class="ico"><use href="#ic-search"></use></svg>
    <span data-i18n="nav.searchTab">Suche</span>
  </button>
  <button type="button" class="bottom-nav-upload" id="bottomUploadBtn" data-i18n-title="nav.upload" title="Hochladen">
    <svg class="ico"><use href="#ic-plus"></use></svg>
  </button>
  <button type="button" class="bottom-nav-item" id="bottomThemeBtn" data-nav="theme">
    <svg class="ico"><use href="#ic-palette"></use></svg>
    <span data-i18n="nav.theme">Design</span>
  </button>
  <button type="button" class="bottom-nav-item" id="bottomProfileBtn" data-nav="profile">
    <svg class="ico"><use href="#ic-user"></use></svg>
    <span data-i18n="nav.profileTab">Profil</span>
  </button>
</nav>

<script src="/js/i18n.js"></script>
<script src="/js/themes.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
