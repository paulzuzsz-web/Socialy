<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Socialy – Teile deine Videos</title>
<meta name="description" content="Socialy – lade Videos hoch und teile sie mit der Welt." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff2d78'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cpath d='M13 10l10 6-10 6z' fill='white'/%3E%3C/svg%3E" />
</head>
<body>

<header class="app-header">
  <div class="brand">
    <svg viewBox="0 0 32 32" fill="none">
      <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff2d78" />
          <stop offset="1" stop-color="#7c3aed" />
        </linearGradient>
      </defs>
      <circle cx="16" cy="16" r="16" fill="url(#logoGrad)" />
      <path d="M13 10l10 6-10 6z" fill="white" />
    </svg>
    <span class="brand-name"><span class="brand-name-text">Socialy</span></span>
  </div>

  <div class="search-wrap">
    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="searchInput" type="text" placeholder="Videos durchsuchen..." autocomplete="off" />
  </div>

  <div class="header-actions">
    <button class="btn btn-primary" id="openUploadBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Hochladen
    </button>
    <button class="user-chip" id="userChipBtn" title="Namen ändern">
      <span class="avatar" id="userAvatar">?</span>
      <span id="userNameLabel">Gast</span>
    </button>
  </div>
</header>

<main>
  <div class="feed-heading">
    <h1>Für dich</h1>
    <span id="videoCountLabel"></span>
  </div>

  <div class="video-grid" id="videoGrid"></div>

  <div class="empty-state hidden" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="5" width="15" height="14" rx="2"></rect>
      <path d="M17 9l5-3v12l-5-3"></path>
    </svg>
    <h2>Noch keine Videos</h2>
    <p>Sei die/der Erste und lade ein Video hoch!</p>
  </div>
</main>

<!-- Watch overlay -->
<div class="watch-overlay hidden" id="watchOverlay">
  <button class="btn btn-icon watch-close" id="closeWatchBtn" title="Schließen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <div class="watch-shell">
    <div class="watch-player">
      <video id="watchVideo" controls autoplay playsinline></video>
    </div>
    <div class="watch-info">
      <h2 class="watch-title" id="watchTitle"></h2>
      <div class="watch-author">
        <span class="avatar" id="watchAvatar"></span>
        <div>
          <div class="name" id="watchUsername"></div>
          <div class="date" id="watchMeta"></div>
        </div>
      </div>
      <p class="watch-description" id="watchDescription"></p>
      <div class="watch-actions">
        <button class="action-btn" id="likeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path>
          </svg>
          <span id="likeCount">0</span>
        </button>
        <div class="action-btn" style="cursor:default;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span id="viewCount">0</span>
        </div>
      </div>
      <div class="comments-section">
        <h3 id="commentCountLabel">Kommentare</h3>
        <form class="comment-form" id="commentForm">
          <input type="text" id="commentInput" placeholder="Kommentar schreiben..." maxlength="500" autocomplete="off" />
          <button type="submit" class="btn btn-primary" style="padding:10px 16px;">Senden</button>
        </form>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Upload modal -->
<div class="modal-overlay hidden" id="uploadModalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Video hochladen</h2>
      <button class="btn btn-icon" id="closeUploadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form id="uploadForm">
      <div class="dropzone" id="dropzone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V4M12 4l-4 4M12 4l4 4"></path>
          <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path>
        </svg>
        <div id="dropzoneLabel">Video auswählen oder hierher ziehen</div>
        <small>MP4, WebM oder MOV – max. 4 MB</small>
        <input type="file" id="fileInput" accept="video/mp4,video/webm,video/quicktime,video/*" hidden />
      </div>

      <div class="video-preview hidden" id="videoPreviewWrap">
        <video id="videoPreview" muted playsinline></video>
      </div>
      <canvas id="thumbCanvas" class="hidden" width="360" height="640"></canvas>

      <div class="field">
        <label for="titleInput">Titel *</label>
        <input type="text" id="titleInput" maxlength="120" placeholder="Wie heißt dein Video?" required />
      </div>

      <div class="field">
        <label for="descriptionInput">Beschreibung</label>
        <textarea id="descriptionInput" maxlength="2000" placeholder="Erzähl etwas über dein Video..."></textarea>
      </div>

      <div class="field">
        <label for="usernameInput">Dein Name *</label>
        <input type="text" id="usernameInput" maxlength="40" placeholder="Benutzername" required />
      </div>

      <div class="form-error" id="uploadError"></div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancelUploadBtn">Abbrechen</button>
        <button type="submit" class="btn btn-primary" id="submitUploadBtn">Veröffentlichen</button>
      </div>
    </form>
  </div>
</div>

<!-- Onboarding banner -->
<div class="onboard-banner hidden" id="onboardBanner">
  <p>Wie sollen wir dich nennen?</p>
  <div class="row">
    <input type="text" id="onboardNameInput" maxlength="40" placeholder="Dein Name" autocomplete="off" />
    <button class="btn btn-primary" id="onboardSaveBtn">OK</button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="/js/app.js"></script>
</body>
</html>
